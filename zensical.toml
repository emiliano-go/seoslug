[project]
site_name = "seoslug"
site_description = "Canonical URL normalization and deterministic SEO payload generation"
site_url = "https://seoslug.emiliano-go.com/"
docs_dir = "docs"
site_dir = "site"

copyright = "&copy; 2026 Emiliano Gandini Outeda"

extra_css = ["stylesheets/extra.css"]

# ==============================================================================
# Theme
# ==============================================================================

[project.theme]
variant = "modern"
custom_dir = "overrides"

font.text = "Ubuntu"
font.code = "JetBrains Mono"

features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.indexes",
    "navigation.top",
    "navigation.footer",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ==============================================================================
# Footer / extra
# ==============================================================================

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/emiliano-go/seoslug"
name = "seoslug on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/seoslug/"
name = "seoslug on PyPI"

# ==============================================================================
# Navigation
# ==============================================================================

[[project.nav]]
"Home" = "index.md"

[[project.nav]]
"Getting Started" = "getting-started.md"

[[project.nav]]
"Core Concepts" = "core-concepts.md"

[[project.nav]]
"Configuration" = "configuration/index.md"

[[project.nav]]
"URL Normalization" = "url-normalization.md"

[[project.nav]]
"SEO Payload" = "seo-payload.md"

[[project.nav]]
"Schema.org and JSON-LD" = "schema-jsonld.md"

[[project.nav]]
"Fallback Chains" = "fallback-chains.md"

[[project.nav]]
"Testing" = "testing.md"

[[project.nav]]
"Integrations" = "integrations/index.md"

[[project.nav]]
"API Reference" = "api-reference.md"

[[project.nav]]
"Recipes" = "recipes/index.md"

[[project.nav]]
"Migration Guide" = "migration.md"

[[project.nav]]
"FAQ" = "faq.md"

[[project.nav]]
"Contributing" = "contributing.md"

[[project.nav]]
"Changelog" = "changelog.md"

[[project.nav]]
"License" = "license.md"

# ==============================================================================
# Markdown extensions
# ==============================================================================

[project.markdown_extensions]
tables = {}
admonition = {}
toc = { permalink = true }
"seoslug.contrib.zensical" = {
  canonical_host = "seoslug.emiliano-go.com",
  public_base_url = "https://seoslug.emiliano-go.com/",
  site_name = "seoslug",
  title_template = "{title} - seoslug",
  default_og_image = "https://seoslug.emiliano-go.com/assets/icon.png",
  publisher_name = "Emiliano Gandini Outeda",
  locale = "en_US",
  twitter_site = "@emiliano_gando",
  auto_generate_schema = true,
  debug_dir = ".seo-debug",
}

[project.markdown_extensions.pymdownx]
highlight = { anchor_linenums = true, line_spans = "__span", pygments_lang_class = true }
inlinehilite = {}
snippets = {}
superfences = {}
tabbed = { alternate_style = true }
tasklist = { custom_checkbox = true }

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]
